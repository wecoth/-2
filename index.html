<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Смета</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@300;400;500&family=Raleway:wght@100;200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100%;
    font-family: 'Advent Pro', sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #f0efec;
  }
  .hero {
    width: 100%; height: 100svh; min-height: 600px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 25% 20%, #e2e0db 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 78% 80%, #d8d6d1 0%, transparent 55%);
  }

  /* --- пролетающие папки --- */
  .fly-stage {
    position: absolute; inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .fly-folder {
    position: absolute;
    width: min(55vw, 240px);
    opacity: 0;
  }
  .fly-folder img { width: 100%; display: block; }

  /* --- главная папка --- */
  .scene {
    position: relative;
    z-index: 2;
    width: min(94vw, 440px);
    transform-origin: center bottom;
    opacity: 0;
  }
  .scene.idle-loop {
    opacity: 1;
    animation: folderIdle 3.6s ease-in-out infinite;
  }
  .folder-shadow {
    width: 60%;
    height: 20px;
    margin: -22px auto 0;
    background: radial-gradient(ellipse 100% 100% at 50% 50%, rgba(0,0,0,0.28) 0%, transparent 70%);
    transform-origin: center center;
    opacity: 0;
  }
  .folder-shadow.idle-loop {
    opacity: 0.9;
    animation: shadowIdle 3.6s ease-in-out infinite;
  }
  .folder-img {
    width: 100%; display: block;
    filter: drop-shadow(0 24px 48px rgba(0,0,0,0.28)) drop-shadow(0 6px 12px rgba(0,0,0,0.16));
  }
  .folder-text {
    position: absolute;
    top: 48%; bottom: 18%;
    left: 10%; right: 10%;
    z-index: 3;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }
  .f-address {
    font-size: clamp(16px, 4.6vw, 22px);
    font-weight: 400;
    color: rgba(255,255,255,0.88);
    line-height: 1.28; letter-spacing: -0.2px;
  }
  .f-bottom { display: flex; flex-direction: column; padding-left: 4%; }
  .f-total-row { display: flex; align-items: baseline; gap: 6px; }
  .f-amount {
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 300; color: rgba(255,255,255,0.94);
    letter-spacing: -1px; line-height: 1;
  }
  .f-currency {
    font-family: 'Raleway', sans-serif;
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 200; color: rgba(255,255,255,0.94);
    vertical-align: 0.05em;
  }
  .f-total-label {
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.3px;
    color: rgba(255,255,255,0.42); margin-top: 4px;
  }

  @keyframes folderIdle {
    0%, 100% { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
    50%       { transform: translate3d(0,-10px,0) scale(0.985) rotate(-0.25deg); }
  }
  @keyframes shadowIdle {
    0%, 100% { opacity: 0.9;  transform: scale(1.08, 1);    filter: blur(6px); }
    50%       { opacity: 0.48; transform: scale(0.82, 0.72); filter: blur(8px); }
  }
  @keyframes landIn {
    0%   { opacity: 0; transform: scale(0.7) translateY(-30px); }
    60%  { opacity: 1; transform: scale(1.04) translateY(4px); }
    80%  { transform: scale(0.98) translateY(-2px); }
    100% { transform: scale(1) translateY(0); }
  }
  @keyframes shadowLand {
    0%   { opacity: 0; transform: scale(0.3,0.3); filter: blur(2px); }
    100% { opacity: 0.9; transform: scale(1.08,1); filter: blur(6px); }
  }
</style>
</head>
<body>
<section class="hero">

  <div class="fly-stage" id="flyStage"></div>

  <div class="scene" id="scene">
    <img class="folder-img" src="folder.png" alt="">
    <div class="folder-shadow" id="folderShadow"></div>
    <div class="folder-text">
      <p class="f-address">ул. Красная, 176, кв. 34</p>
      <div class="f-bottom">
        <div class="f-total-row">
          <span class="f-amount">784 000</span>
          <span class="f-currency">₽</span>
        </div>
        <p class="f-total-label">Итоговая стоимость</p>
      </div>
    </div>
  </div>

</section>

<script>
const scene  = document.getElementById('scene');
const shadow = document.getElementById('folderShadow');
const stage  = document.getElementById('flyStage');

const FOLDER_COUNT = 7;
const STRIP_DURATION = 1800;
const FOLDER_INTERVAL = 160;
const vh = window.innerHeight;
const vw = window.innerWidth;
const folderW = Math.min(vw * 0.55, 240);
const folderH = folderW;
const centerY = vh / 2 - folderH / 2;
const startX = -folderW - 40;
const endX   = vw + folderW;
const scaleVal = 0.72;
const yOff = 30;

function makeFlyer(index) {
  const el = document.createElement('div');
  el.className = 'fly-folder';
  el.style.cssText = `
    width:${folderW}px;
    top:${centerY - yOff + Math.sin(index * 1.3) * 18}px;
    left:${startX}px;
    transform: scale(${scaleVal}) rotate(${(index % 3 - 1) * 4}deg);
    opacity:0;
  `;
  const img = document.createElement('img');
  img.src = 'folder.png';
  el.appendChild(img);
  stage.appendChild(el);
  return el;
}

function animateFlyer(el, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      const dur = STRIP_DURATION;
      el.style.transition = `left ${dur}ms cubic-bezier(0.25,0.1,0.4,1), opacity 80ms`;
      el.style.opacity = '1';
      el.style.left = endX + 'px';
      setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(resolve, 200);
      }, dur - 200);
    }, delay);
  });
}

async function runIntro() {
  const promises = [];
  for (let i = 0; i < FOLDER_COUNT; i++) {
    const el = makeFlyer(i);
    promises.push(animateFlyer(el, i * FOLDER_INTERVAL));
  }

  const totalDelay = (FOLDER_COUNT - 1) * FOLDER_INTERVAL + STRIP_DURATION;

  setTimeout(() => {
    stage.innerHTML = '';
    scene.style.transition = 'none';
    scene.style.opacity = '0';
    scene.style.transform = 'scale(0.7) translateY(-30px)';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        scene.style.transition = 'opacity 0.08s, transform 0.45s cubic-bezier(0.22,1,0.36,1)';
        scene.style.opacity = '1';
        scene.style.transform = 'scale(1) translateY(0)';

        shadow.style.transition = 'opacity 0.5s ease';
        shadow.style.opacity = '0.9';

        setTimeout(() => {
          scene.style.transition = '';
          scene.style.transform = '';
          scene.classList.add('idle-loop');
          shadow.style.transition = '';
          shadow.classList.add('idle-loop');
        }, 500);
      });
    });
  }, totalDelay - 120);

  await Promise.all(promises);
}

runIntro();
</script>
</body>
</html>
