<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Смета</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@300;400;500&family=Raleway:wght@100;200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100%;
    font-family: 'Advent Pro', sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #f0efec;
  }
  .hero {
    width: 100%; height: 100svh; min-height: 600px;
    display: flex; align-items: flex-start; justify-content: center;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 25% 20%, #e2e0db 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 78% 80%, #d8d6d1 0%, transparent 55%);
  }
  .scene {
    position: relative;
    z-index: 2;
    width: min(94vw, 440px);
    margin-top: 0;
    transform-origin: center bottom;
  }
  .scene.float-in  { animation: floatIn 1.1s linear both; }
  .scene.idle-loop { animation: folderIdle 3.6s ease-in-out infinite; }

  .folder-shadow {
    width: 60%;
    height: 20px;
    margin: -22px auto 0;
    background: radial-gradient(ellipse 100% 100% at 50% 50%, rgba(0,0,0,0.28) 0%, transparent 70%);
    transform-origin: center center;
  }
  .folder-shadow.shadow-in  { animation: shadowIn  1.1s ease-out both; }
  .folder-shadow.idle-loop  { animation: shadowIdle 3.6s ease-in-out infinite; }

  .folder-img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 24px 48px rgba(0,0,0,0.28)) drop-shadow(0 6px 12px rgba(0,0,0,0.16));
  }
  .folder-text {
    position: absolute;
    top: 48%; bottom: 18%;
    left: 10%; right: 10%;
    z-index: 3;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }
  .f-address {
    font-size: clamp(16px, 4.6vw, 22px);
    font-weight: 400; color: rgba(255,255,255,0.88);
    line-height: 1.28; letter-spacing: -0.2px;
  }
  .f-bottom { display: flex; flex-direction: column; padding-left: 4%; }
  .f-total-row { display: flex; align-items: baseline; gap: 6px; }
  .f-amount {
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 300; color: rgba(255,255,255,0.94);
    letter-spacing: -1px; line-height: 1;
  }
  .f-currency {
    font-family: 'Raleway', sans-serif;
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 200; color: rgba(255,255,255,0.94);
    vertical-align: 0.05em;
  }
  .f-total-label {
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.3px;
    color: rgba(255,255,255,0.42); margin-top: 4px;
  }

  @keyframes floatIn {
    0%   { opacity: 0;   transform: scale(0.07) translate(-320px, -280px) rotate(-15deg);  }
    5%   { opacity: 0.4; transform: scale(0.09) translate(-290px, -255px) rotate(-13deg);  }
    10%  { opacity: 1;   transform: scale(0.12) translate(-220px, -200px) rotate(-10deg);  }
    15%  {               transform: scale(0.16) translate(-170px, -160px) rotate(-8deg);   }
    20%  {               transform: scale(0.20) translate(-130px, -130px) rotate(-6deg);   }
    25%  {               transform: scale(0.25) translate(-85px,  -100px) rotate(-4deg);   }
    30%  {               transform: scale(0.30) translate(-40px,   -70px) rotate(-2deg);   }
    35%  {               transform: scale(0.36) translate(10px,    -45px) rotate(0deg);    }
    40%  {               transform: scale(0.42) translate(60px,    -20px) rotate(2deg);    }
    45%  {               transform: scale(0.49) translate(85px,     -2px) rotate(2.5deg);  }
    50%  {               transform: scale(0.56) translate(100px,    15px) rotate(3deg);    }
    55%  {               transform: scale(0.63) translate(96px,     24px) rotate(2.5deg);  }
    60%  {               transform: scale(0.70) translate(80px,     30px) rotate(2deg);    }
    65%  {               transform: scale(0.76) translate(62px,     28px) rotate(1.5deg);  }
    70%  {               transform: scale(0.82) translate(45px,     22px) rotate(1deg);    }
    75%  {               transform: scale(0.87) translate(30px,     16px) rotate(0.7deg);  }
    80%  {               transform: scale(0.92) translate(18px,     10px) rotate(0.4deg);  }
    84%  {               transform: scale(0.95) translate(10px,      6px) rotate(0.2deg);  }
    88%  {               transform: scale(0.98) translate(5px,       3px) rotate(0.1deg);  }
    90%  {               transform: scale(1.04) translate(4px,       4px) rotate(0deg);    }
    92%  {               transform: scale(1.02) translate(2px,       2px) rotate(0deg);    }
    95%  {               transform: scale(0.98) translate(0px,       0px) rotate(0deg);    }
    97%  {               transform: scale(0.99) translate(0px,       0px) rotate(0deg);    }
    100% { opacity: 1;   transform: scale(1)    translate(0, 0)           rotate(0deg);    }
  }
  @keyframes folderIdle {
    0%, 100% { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
    50%       { transform: translate3d(0,-10px,0) scale(0.985) rotate(-0.25deg); }
  }
  @keyframes shadowIn {
    0%, 25% { opacity: 0;   transform: scale(0.1,0.1); filter: blur(2px); }
    100%    { opacity: 0.9; transform: scale(1.08,1);  filter: blur(6px); }
  }
  @keyframes shadowIdle {
    0%, 100% { opacity: 0.9;  transform: scale(1.08,1);    filter: blur(6px); }
    50%       { opacity: 0.48; transform: scale(0.82,0.72); filter: blur(8px); }
  }
</style>
</head>
<body>
<section class="hero">
  <div class="scene" id="scene">
    <img class="folder-img" src="folder.png" alt="">
    <div class="folder-shadow" id="folderShadow"></div>
    <div class="folder-text">
      <p class="f-address">ул. Красная, 176, кв. 34</p>
      <div class="f-bottom">
        <div class="f-total-row">
          <span class="f-amount">784 000</span>
          <span class="f-currency">₽</span>
        </div>
        <p class="f-total-label">Итоговая стоимость</p>
      </div>
    </div>
  </div>
</section>

<script>
  const scene  = document.getElementById('scene');
  const shadow = document.getElementById('folderShadow');

  scene.classList.add('float-in');
  shadow.classList.add('shadow-in');

  scene.addEventListener('animationend', () => {
    scene.classList.remove('float-in');
    scene.classList.add('idle-loop');
    shadow.classList.remove('shadow-in');
    shadow.classList.add('idle-loop');
  }, { once: true });
</script>
</body>
</html>
